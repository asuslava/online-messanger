<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
</head>
<body>

<h2>Chat</h2>

<p id="status"></p>

<script>
    const token = localStorage.getItem("token");

    if (!token) {
        document.getElementById("status").innerText = "You are not logged in!";
    } else {
        document.getElementById("status").innerText = "You are logged in!";
        console.log("JWT:", token);
    }
</script>

</body>
</html>
